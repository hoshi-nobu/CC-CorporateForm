<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>お問い合わせ</h1>
      <p>ご質問やご相談はこちらからお気軽にどうぞ。通常2〜3営業日以内にご返信いたします。</p>
    </div>

    <div class="card" id="form-card">
      <div class="field">
        <label for="category">お問い合わせ種別 <span class="required">*</span></label>
        <select id="category">
          <option value="">選択してください</option>
          <option value="product">製品・サービスについて</option>
          <option value="price">料金・お見積もり</option>
          <option value="support">技術サポート</option>
          <option value="partnership">パートナーシップ・提携</option>
          <option value="media">取材・メディア</option>
          <option value="other">その他</option>
        </select>
      </div>

      <hr class="divider">

      <div class="row">
        <div class="field">
          <label for="name">お名前 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="山田 太郎">
        </div>
        <div class="field">
          <label for="company">会社名 <span class="badge">任意</span></label>
          <input type="text" id="company" placeholder="株式会社〇〇">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="email">メールアドレス <span class="required">*</span></label>
          <input type="email" id="email" placeholder="taro@example.com">
        </div>
        <div class="field">
          <label for="phone">電話番号 <span class="badge">任意</span></label>
          <input type="tel" id="phone" placeholder="03-0000-0000">
        </div>
      </div>

      <div class="field">
        <label for="subject">件名 <span class="required">*</span></label>
        <input type="text" id="subject" placeholder="お問い合わせの件名を入力してください">
      </div>

      <div class="field">
        <label for="message">お問い合わせ内容 <span class="required">*</span></label>
        <textarea id="message" placeholder="詳しい内容をご記入ください..."></textarea>
        <div class="char-count" id="char-count">0 / 1000文字</div>
      </div>

      <div class="privacy">
        ご入力いただいた個人情報は、お問い合わせへの回答および関連するご連絡のみに使用し、
        第三者への提供はいたしません。詳細は<a href="#">プライバシーポリシー</a>をご覧ください。
      </div>

      <div class="check-row">
        <input type="checkbox" id="agree">
        <label for="agree">プライバシーポリシーに同意する</label>
      </div>

      <div class="btn-row">
        <button class="btn-submit" id="submit-btn">送信する</button>
      </div>
    </div>

    <div class="card success" id="success-card">
      <div class="success-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10l4 4 8-8" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>送信が完了しました</h2>
      <p>お問い合わせありがとうございます。<br>2〜3営業日以内にご連絡いたします。</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
